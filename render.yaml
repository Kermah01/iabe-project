services:
  - type: web
    name: iabe-platform
    env: python
    buildCommand: "bash render-build.sh"
    startCommand: "gunicorn iabe_project.wsgi:application"
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: iabe-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: iabe-db
    databaseName: iabe
    user: iabe
    plan: free
